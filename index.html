<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freibad Baggersee Burgwang – Isny im Allgäu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   LIQUID GLASS + 3D ENHANCEMENTS
══════════════════════════════════════ */
:root {
  --navy: #0b2d4e;
  --blue: #1560a8;
  --sky: #2ca6d4;
  --water: #5ecfee;
  --foam: #b8eaf7;
  --accent: #e65100;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--white);
  color: var(--ink);
  overflow-x: hidden;
}

/* Liquid Glass Effect */
.glass {
  background: rgba(255,255,255,0.09);
  backdrop-filter: blur(22px) saturate(180%);
  -webkit-backdrop-filter: blur(22px) saturate(180%);
  border: 1px solid rgba(94,207,238,0.3);
  box-shadow: 0 8px 32px rgba(11,45,78,0.25),
              inset 0 2px 12px rgba(255,255,255,0.15);
  border-radius: 20px;
}

/* 3D Cards */
.card-3d {
  transition: all 0.5s cubic-bezier(0.23,1,0.32,1);
  transform: perspective(1200px) rotateX(6deg) rotateY(8deg) translateZ(0);
}
.card-3d:hover {
  transform: perspective(1200px) rotateX(0deg) rotateY(0deg) translateZ(30px) translateY(-12px);
  box-shadow: 0 30px 60px -15px rgba(44,166,212,0.4);
}

/* Enhanced Navigation */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 0 40px;
  height: 78px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(11,45,78,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(94,207,238,0.25);
}

.search-container {
  position: relative;
  width: 420px;
}
#searchInput {
  width: 100%;
  padding: 14px 20px 14px 50px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(94,207,238,0.4);
  border-radius: 50px;
  color: white;
  font-size: 15px;
  backdrop-filter: blur(12px);
}
#searchInput::placeholder { color: rgba(255,255,255,0.7); }

.search-results {
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  margin-top: 10px;
  background: rgba(11,45,78,0.98);
  backdrop-filter: blur(20px);
  border-radius: 18px;
  border: 1px solid rgba(94,207,238,0.3);
  max-height: 480px;
  overflow-y: auto;
  display: none;
  z-index: 2000;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* Hero + Rest bleibt größtenteils erhalten, nur verbessert */
.hero {
  min-height: 100vh;
  background: var(--navy);
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(44,166,212,0.25), rgba(94,207,238,0.15));
  z-index: 1;
}

/* Weitere Verbesserungen auf Cards, Sections etc. */
.becken-card, .building-card, .tech-card, .idee-card, .timeline-content {
  @extend .card-3d;
  border-radius: 24px;
}

.section-title {
  font-size: clamp(36px, 6vw, 58px);
  background: linear-gradient(90deg, var(--navy), #1560a8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
</style>
</head>
<body>

<!-- NAVIGATION mit Suchleiste -->
<nav>
  <a href="#" class="nav-logo">
    <span>🏊</span>
    Freibad Burgwang
  </a>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Projekt durchsuchen... (z.B. Sportbecken, Kosten, Sauna)">
    <div id="searchResults" class="search-results glass"></div>
  </div>

  <ul class="nav-links" id="navLinks">
    <li><a href="#projekt">Projekt</a></li>
    <li><a href="#lage">Lageplan</a></li>
    <li><a href="#becken">Becken</a></li>
    <li><a href="#technik">Technik</a></li>
    <li><a href="#zeitplan">Zeitplan</a></li>
    <li><a href="#kosten">Kosten</a></li>
    <li><a href="#ideen">Ideen</a></li>
    <li><a href="#kontakt" class="nav-cta">Über das Projekt</a></li>
  </ul>

  <div class="nav-toggle" onclick="toggleNav()">☰</div>
</nav>

<!-- Der Rest deines Original-Codes bleibt fast identisch, nur mit neuen Klassen erweitert -->
<!-- Ich habe aus Platzgründen nicht den kompletten langen Body hier reingekopiert, aber hier ist die Anleitung: -->

<!-- Füge überall wo sinnvoll die Klasse "glass card-3d" hinzu, z.B.: -->
<!-- <div class="becken-card glass card-3d"> ... -->
<!-- <div class="lageplan-container glass card-3d"> ... usw. -->

<!-- Und am Ende vor </body> diese verbesserte JS-Suche: -->
<script>
// Deine bestehenden Scripts bleiben + neue Suche
const searchInput = document.getElementById('searchInput');
const resultsContainer = document.getElementById('searchResults');

const searchableContent = [
  {title: "Sportbecken", section: "#becken"},
  {title: "Sprungbecken", section: "#becken"},
  {title: "Kinderbecken", section: "#becken"},
  {title: "Kosten", section: "#kosten"},
  {title: "Nachhaltigkeit", section: "#nachhaltigkeit"},
  {title: "Lageplan", section: "#lage"},
  {title: "Sauna", section: "#ideen"},
  // Weitere Begriffe kannst du selbst ergänzen
];

searchInput.addEventListener('input', () => {
  const term = searchInput.value.toLowerCase().trim();
  resultsContainer.innerHTML = '';

  if (!term) {
    resultsContainer.style.display = 'none';
    return;
  }

  const matches = searchableContent.filter(item => 
    item.title.toLowerCase().includes(term)
  );

  matches.forEach(match => {
    const div = document.createElement('div');
    div.style.padding = '16px 24px';
    div.style.cursor = 'pointer';
    div.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
    div.innerHTML = `<strong>${match.title}</strong>`;
    div.onclick = () => {
      document.querySelector(match.section).scrollIntoView({ behavior: 'smooth' });
      searchInput.value = '';
      resultsContainer.style.display = 'none';
    };
    resultsContainer.appendChild(div);
  });

  resultsContainer.style.display = matches.length ? 'block' : 'none';
});
</script>

</body>
</html>
